---
layout: default
---
<article class="page-content">
  <div class="content-inner">
    {% if page.hero_title %}
    <div class="page-hero">
      <h1>{{ page.hero_title }}</h1>
      {% if page.hero_subtitle %}<p class="hero-subtitle">{{ page.hero_subtitle }}</p>{% endif %}
    </div>
    {% else %}
    <h1>{{ page.title }}</h1>
    {% endif %}
    {{ content }}
  </div>
</article>
