<header class="site-header">
  <div class="header-inner">
    <div class="site-branding">
      <a href="{{ '/' | relative_url }}" class="site-title">Cohousing talks</a>
      <p class="site-tagline">platforma pro komunitní, participativní, cohousingové bydlení</p>
    </div>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
      <span class="menu-icon"></span>
    </button>
    <nav class="site-nav">
      <ul class="nav-menu">
        {% for item in site.data.nav %}
        <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
