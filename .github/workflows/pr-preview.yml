name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency: preview-${{ github.head_ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: github.event.action != 'closed'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll with preview baseurl
        if: github.event.action != 'closed'
        run: bundle exec jekyll build --baseurl "/cohousingtalks/pr-preview/pr-${{ github.event.pull_request.number }}" -d ./_site

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
